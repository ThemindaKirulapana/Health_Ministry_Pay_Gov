<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Health Ministry Sri Lanka</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1210;--bg2:#141a16;--bg3:#1a2320;--bg4:#1f2b28;
  --border:#263330;--border2:#2f3f3b;
  --green:#2d6a4f;--green-mid:#3a8c68;--green-lite:#52b788;
  --ash:#3d4f4a;--ash-mid:#5a706a;--ash-lite:#8aa39d;
  --cream:#d8e8e2;--white:#eef5f2;--muted:#6a8a82;
  --danger:#b05040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',serif;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 800px 600px at 60% 40%,rgba(45,106,79,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.login-box{
  width:420px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:44px 40px;
  position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.login-box::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60%;height:2px;
  background:linear-gradient(90deg,transparent,var(--green-lite),transparent);
  border-radius:0 0 4px 4px;
}
.ministry-badge{
  display:flex;align-items:center;gap:12px;margin-bottom:28px;
}
.badge-icon{
  width:46px;height:46px;
  background:linear-gradient(135deg,var(--green),var(--green-mid));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 0 20px rgba(58,140,104,0.3);
  flex-shrink:0;
}
.badge-text h1{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--green-lite);line-height:1.3;
}
.badge-text p{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;
}
.login-title{
  font-family:'Syne',sans-serif;font-size:24px;font-weight:800;
  color:var(--white);margin-bottom:6px;letter-spacing:-0.3px;
}
.login-sub{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--muted);letter-spacing:1px;margin-bottom:30px;
}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.form-label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
}
.form-input{
  background:var(--bg3);border:1px solid var(--border2);border-radius:9px;
  padding:12px 16px;color:var(--cream);font-family:'Lora',serif;font-size:15px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
}
.form-input:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(58,140,104,0.12);}
.form-input::placeholder{color:var(--muted);font-size:13px;}
.error-msg{
  background:rgba(176,80,64,0.1);border:1px solid rgba(176,80,64,0.3);
  border-radius:8px;padding:10px 14px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:#e08070;letter-spacing:.3px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--green),var(--green-mid));
  border:none;color:#fff;border-radius:10px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;font-weight:500;
  cursor:pointer;transition:filter .2s,box-shadow .2s;margin-top:4px;
}
.btn-login:hover{filter:brightness(1.12);box-shadow:0 6px 24px rgba(58,140,104,0.3);}
.login-footer{
  margin-top:22px;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  color:var(--muted);letter-spacing:.5px;line-height:1.7;
}

</style>
</head>
<body>
<div class="login-box">
  <div class="ministry-badge">
    <div class="badge-icon">🏥</div>
    <div class="badge-text">
      <h1>Ministry of Health<br>Sri Lanka</h1>
      <p>Employee Salary Portal</p>
    </div>
  </div>

  <div class="login-title">Employee Login</div>
  <div class="login-sub">Sign in with your employee credentials</div>

  {% if error %}
  <div class="error-msg">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Employee Number</label>
      <input class="form-input" type="text" name="emp_no" placeholder="e.g. 2005" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn-login" type="submit">Sign In →</button>
    <p style=" margin-top:12px; font-family:'IBM Plex Mono',monospace;font-size:13px; color:var(--muted); text-align:center;">
      Don't have an account? <a href="/register" style="color: #52b788; font-size: large;">Register here</a>.
    </p>
   
  </form>

  <div class="login-footer">
    Ministry of Health · Democratic Socialist Republic of Sri Lanka<br>
    Salary Management System v2.0
  </div>
</div>
</body>
</html>
